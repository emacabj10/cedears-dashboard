name: Update quotes (diario)

on:
  schedule:
    - cron: '00 11 * * 0-6'   # 10:30 ARG — apertura
    - cron: '00 15 * * 0-6'   # 13:30 ARG — media rueda
    - cron: '00 17 * * 0-6'   # 16:30 ARG — cierre
  workflow_dispatch:
    inputs:
      cmd_operado:
        required: false
        default: ''
      callback_query_id:
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Detect command type
        id: cmd
        run: |
          CMD="${{ github.event.inputs.cmd_operado }}"
          # trim de espacios
          CMD="${CMD#"${CMD%%[![:space:]]*}"}"
          CMD="${CMD%"${CMD##*[![:space:]]}"}"
          # "null" es lo que GitHub expande cuando el input no existe (cron)
          if [[ "$CMD" == "" || "$CMD" == "null" || "$CMD" == "!run" ]]; then
            echo "type=daily" >> $GITHUB_OUTPUT
          elif [[ "$CMD" == "__FETCH_ONLY__" ]]; then
            echo "type=fetch_only" >> $GITHUB_OUTPUT
          elif [[ "$CMD" == !operado\ * || "$CMD" == operado:* ]]; then
            echo "type=operado" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi
          echo "DEBUG cmd_operado=[${CMD}]"

      - name: Fetch quotes from Yahoo Finance
        if: ${{ steps.cmd.outputs.type == 'daily' || steps.cmd.outputs.type == 'fetch_only' }}
        run: python fetch_quotes.py

      - name: Commit and push data.json
        if: ${{ steps.cmd.outputs.type == 'daily' || steps.cmd.outputs.type == 'fetch_only' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Update quotes $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send Telegram alerts
        if: ${{ steps.cmd.outputs.type == 'daily' || steps.cmd.outputs.type == 'operado' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CMD_OPERADO: ${{ github.event.inputs.cmd_operado }}
          CALLBACK_QUERY_ID: ${{ github.event.inputs.callback_query_id }}
        run: |
          git pull --rebase --autostash
          python alert_quotes.py

      - name: Commit data.json after alerts
        if: ${{ steps.cmd.outputs.type == 'daily' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Update daily $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Commit data.json after operado
        if: ${{ steps.cmd.outputs.type == 'operado' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Update after operado $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
