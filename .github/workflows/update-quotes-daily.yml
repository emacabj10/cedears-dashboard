name: Update quotes (diario)

on:
  schedule:
    - cron: '30 10 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '30 16 * * 1-5'
  workflow_dispatch:
    inputs:
      cmd_operado:
        required: false
        default: ''
      callback_query_id:
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Fetch quotes (Solo si no es comando operado)
        if: ${{ github.event.inputs.cmd_operado == '' || github.event.inputs.cmd_operado == '__FETCH_ONLY__' }}
        run: python fetch_quotes.py

      - name: Send Telegram alerts / Process Operado
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CMD_OPERADO: ${{ github.event.inputs.cmd_operado }}
          CALLBACK_QUERY_ID: ${{ github.event.inputs.callback_query_id }}
        run: python alert_quotes.py

      - name: Final Sync and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Pull con rebase para evitar errores de sincronización
          git pull --rebase --autostash
          if ! git diff --staged --quiet; then
            git commit -m "Daily update $(date -u '+%H:%M')"
            git push
          else
            echo "Nada nuevo que subir."
          fi
