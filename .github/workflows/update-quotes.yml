name: Update quotes

on:
  schedule:
    # ── Runs diarios completos (fetch + análisis + alertas) ──────────────────
    - cron: '30 10 * * 1-5'   # 10:30 ARG — apertura
    - cron: '30 13 * * 1-5'   # 13:30 ARG — media rueda
    - cron: '30 16 * * 1-5'   # 16:30 ARG — cierre
    # ── Chequeo intradiario liviano cada 10 minutos (horario de mercado) ─────
    # Lun-Vie 13:40–19:20 UTC (10:40–16:20 ARG). Evita solapar con runs diarios.
    - cron: '40,50 10 * * 1-5'
    - cron: '0,10,20 11 * * 1-5'
    - cron: '30,40,50 11 * * 1-5'
    - cron: '0,10,20 12 * * 1-5'
    - cron: '30,40,50 12 * * 1-5'
    - cron: '0,10,20 13 * * 1-5'
    - cron: '40,50 13 * * 1-5'
    - cron: '0,10,20 14 * * 1-5'
    - cron: '30,40,50 14 * * 1-5'
    - cron: '0,10,20 15 * * 1-5'
    - cron: '30,40,50 15 * * 1-5'
    - cron: '0,10,20,40,50 16 * * 1-5'
  workflow_dispatch:
    inputs:
      cmd_operado:
        required: false
        default: ''
      callback_query_id:
        required: false
        default: ''
      intraday_check:
        description: 'Forzar chequeo intradiario manual (1=sí)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      # Detectar si es un run intradiario (cron de 10 min, no el de :30 diario)
      # Los crons diarios corren en HH:30; los intradiarios en cualquier otro minuto.
      - name: Detect intraday run
        id: detect
        run: |
          MINUTE=$(date -u +%M)
          MANUAL_INTRA="${{ github.event.inputs.intraday_check }}"
          if [[ "$MINUTE" != "30" || "$MANUAL_INTRA" == "1" ]]; then
            echo "is_intraday=true" >> $GITHUB_OUTPUT
          else
            echo "is_intraday=false" >> $GITHUB_OUTPUT
          fi

      # MODIFICACIÓN: Ahora corre si está vacío O si es __FETCH_ONLY__ O si es run diario (:30)
      - name: Fetch quotes from Yahoo Finance
        if: ${{ (github.event.inputs.cmd_operado == '' || github.event.inputs.cmd_operado == '__FETCH_ONLY__') && steps.detect.outputs.is_intraday == 'false' }}
        run: python fetch_quotes.py

      - name: Commit and push data.json
        if: ${{ (github.event.inputs.cmd_operado == '' || github.event.inputs.cmd_operado == '__FETCH_ONLY__') && steps.detect.outputs.is_intraday == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Update quotes $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # Chequeo intradiario liviano — corre en runs de 10 min, no en los diarios
      - name: Intraday price check
        if: ${{ github.event.inputs.cmd_operado == '' && steps.detect.outputs.is_intraday == 'true' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INTRADAY_CHECK: "1"
        run: python alert_quotes.py

      - name: Commit data.json after intraday check
        if: ${{ github.event.inputs.cmd_operado == '' && steps.detect.outputs.is_intraday == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Intraday check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # Se mantiene igual: Solo corre en runs diarios completos sin comando manual
      - name: Send Telegram alerts
        if: ${{ github.event.inputs.cmd_operado == '' && steps.detect.outputs.is_intraday == 'false' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CMD_OPERADO: ${{ github.event.inputs.cmd_operado }}
          CALLBACK_QUERY_ID: ${{ github.event.inputs.callback_query_id }}
        run: python alert_quotes.py

      - name: Commit data.json after alerts
        if: ${{ github.event.inputs.cmd_operado == '' && steps.detect.outputs.is_intraday == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Update daily $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Commit data.json after operado
        if: ${{ github.event.inputs.cmd_operado != '' && github.event.inputs.cmd_operado != '__FETCH_ONLY__' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data.json
          git diff --staged --quiet || git commit -m "Update after operado $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
