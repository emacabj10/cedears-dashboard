name: Telegram Trigger Listener

on:
  schedule:
    - cron: '* * * * 1-5'   # Cada minuto, lunes a viernes
  workflow_dispatch:         # También se puede disparar manualmente desde GitHub

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - name: Check Telegram for trigger keyword
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          GH_REPO:          ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os

          TOKEN    = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID  = os.environ["TELEGRAM_CHAT_ID"]
          GH_TOKEN = os.environ["GH_TOKEN"]
          GH_REPO  = os.environ["GH_REPO"]

          KEYWORD       = "!run"           # Palabra que enviás por Telegram
          WORKFLOW_FILE = "update-quotes.yml"  # Nombre exacto de tu workflow principal
          BRANCH        = "main"           # Rama de tu repo (cambiá a "master" si corresponde)

          # ── 1. Obtener mensajes recientes de Telegram ──────────────────────────
          url = f"https://api.telegram.org/bot{TOKEN}/getUpdates?limit=10&allowed_updates=[\"message\"]"
          try:
              with urllib.request.urlopen(url, timeout=10) as r:
                  updates = json.loads(r.read()).get("result", [])
          except Exception as e:
              print(f"Error al consultar Telegram: {e}")
              exit(0)

          # ── 2. Buscar la keyword en los mensajes ───────────────────────────────
          triggered = False
          for upd in updates:
              msg  = upd.get("message", {})
              chat = msg.get("chat", {})
              text = msg.get("text", "")
              if str(chat.get("id")) == CHAT_ID and KEYWORD in text.lower():
                  triggered = True
                  print(f"Keyword '{KEYWORD}' detectada en mensaje: {text!r}")
                  break

          if not triggered:
              print(f"Sin keyword '{KEYWORD}' detectada. Nada que hacer.")
              exit(0)

          # ── 3. Disparar el workflow principal via GitHub API ───────────────────
          api_url = f"https://api.github.com/repos/{GH_REPO}/actions/workflows/{WORKFLOW_FILE}/dispatches"
          payload = json.dumps({"ref": BRANCH}).encode()
          req = urllib.request.Request(
              api_url,
              data=payload,
              headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept":        "application/vnd.github+json",
                  "Content-Type":  "application/json",
              },
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Workflow disparado. GitHub API status: {resp.status}")
          except Exception as e:
              print(f"Error al disparar workflow: {e}")
              exit(1)

          # ── 4. Confirmar por Telegram ──────────────────────────────────────────
          confirm_url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
          confirm_payload = json.dumps({
              "chat_id":    CHAT_ID,
              "text":       "✅ Ejecución manual iniciada. El reporte llega en unos segundos.",
              "parse_mode": "HTML"
          }).encode()
          urllib.request.urlopen(urllib.request.Request(
              confirm_url,
              data=confirm_payload,
              headers={"Content-Type": "application/json"},
              method="POST"
          ))
          print("Confirmación enviada por Telegram.")
          EOF
